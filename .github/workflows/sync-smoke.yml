name: sync-smoke

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Ensure templates exist
        run: python scripts/compose.py --check
      - name: Sync into temp project
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/proj"
          python scripts/sync.py --yes "$tmp/proj" ruby
          test -f "$tmp/proj/.cursorrules"
          python scripts/sync.py --yes --backup "$tmp/proj" hono-workers
          test -f "$tmp/proj/.cursorrules.bak"
